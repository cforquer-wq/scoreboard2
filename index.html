<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <style>
        @import url('https://fonts.cdnfonts.com/css/cursed-timer-ulil');
        </style>
    </head>
    <body>
        <div class="container">
            <div id="home-container">
                <h3>HOME</h3>
                <div id="home-score">0</div>
                <div class="add-pts">
                    <button class="add-btn" onclick="addOneHome()">+1</button>
                    <button class="add-btn" onclick="addTwoHome()">+2</button>
                    <button class="add-btn" onclick="addThreeHome()">+3</button>
                </div>
            </div>
            
            <div>
                <h3>GUEST</h3>
                <div id="away-score">0</div>
                <div class="add-pts">
                    <button class="add-btn" onclick="addOneAway()">+1</button>
                    <button class="add-btn" onclick="addTwoAway()"">+2</button>
                    <button class="add-btn" onclick="addThreeAway()"">+3</button>
                </div>
            </div>
        </div>
        <div class="btn-container">
                <button id ="reset-btn" onclick="resetGame()"">RESET GAME</button>
            </div>
        <script src="index.js"></script>
    </body>
</html>
